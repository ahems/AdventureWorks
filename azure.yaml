# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: adventureworks
hooks:
  preup:
    shell: pwsh
    run: ./scripts/hooks/preup.ps1
    interactive: true
  postup:
    shell: pwsh
    run: ./scripts/hooks/postup.ps1
    interactive: true
  postprovision:
    shell: pwsh
    run: ./scripts/hooks/postprovision.ps1
    interactive: true
  predeploy:
    shell: sh
    run: ./scripts/hooks/predeploy.sh
    interactive: false
  postdeploy:
    shell: pwsh
    run: ./scripts/hooks/postdeploy.ps1
    interactive: true
  postdown:
    shell: pwsh
    run: ./scripts/hooks/postdown.ps1
    interactive: true
services:
  api-mcp:
    project: ./api-mcp
    host: containerapp
    language: docker
    docker:
      path: Dockerfile
      remoteBuild: true
  api:
    project: ./api
    host: containerapp
    language: python
    docker:
      path: dockerfile
      remoteBuild: true
  api-functions:
    project: ./api-functions
    host: containerapp
    language: csharp
    docker:
      path: Dockerfile
      remoteBuild: true
  app:
    project: ./app
    host: staticwebapp
    language: js
    dist: dist
    config:
      buildCommand: bash scripts/build-with-env.sh
      outputLocation: dist
infra:
  provider: bicep
  path: ./infra
